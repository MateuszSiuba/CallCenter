<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Hub Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfeff',
              100: '#cffafe',
              300: '#67e8f9',
              600: '#0e7490',
              700: '#155e75'
            }
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
  <div id="toast" class="pointer-events-none fixed right-4 top-4 z-50 hidden max-w-sm rounded-2xl border px-4 py-3 text-sm font-semibold shadow-xl"></div>

  <section id="loginView" class="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/40 px-4 backdrop-blur-sm">
    <div class="w-full max-w-md rounded-3xl border border-white/70 bg-white p-8 shadow-2xl">
      <p class="text-xs font-bold uppercase tracking-[0.24em] text-brand-700">Support Hub</p>
      <h1 class="mt-3 text-3xl font-bold text-slate-900">Admin Login</h1>
      <p class="mt-2 text-sm text-slate-600">Sign in with the backend admin credentials configured on Render.</p>

      <form id="loginForm" class="mt-6 space-y-4">
        <label class="block">
          <span class="text-sm font-semibold text-slate-700">Username</span>
          <input id="usernameInput" type="text" autocomplete="username" required class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-brand-600 focus:ring-4 focus:ring-cyan-100">
        </label>
        <label class="block">
          <span class="text-sm font-semibold text-slate-700">Password</span>
          <input id="passwordInput" type="password" autocomplete="current-password" required class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-brand-600 focus:ring-4 focus:ring-cyan-100">
        </label>
        <button id="loginButton" type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-brand-700 px-4 py-2.5 text-sm font-bold text-white shadow transition hover:bg-brand-600">Login</button>
      </form>
    </div>
  </section>

  <main id="adminView" class="hidden min-h-screen">
    <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
      <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-4 py-4 lg:px-6">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.22em] text-brand-700">Support Hub</p>
          <h1 class="text-2xl font-bold text-slate-900">Admin Panel</h1>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button id="refreshModelsBtn" type="button" class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Refresh</button>
          <button id="logoutBtn" type="button" class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-2 text-sm font-semibold text-rose-700 transition hover:bg-rose-100">Logout</button>
        </div>
      </div>
    </header>

    <div class="mx-auto grid max-w-7xl gap-5 px-4 py-6 lg:grid-cols-[320px_1fr] lg:px-6">
      <aside class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="inline-flex w-full rounded-xl border border-slate-200 bg-slate-50 p-1">
          <button type="button" data-module-tab="MNT" class="module-tab flex-1 rounded-lg bg-white px-3 py-2 text-sm font-bold text-brand-700 shadow-sm">Manage MNT</button>
          <button type="button" data-module-tab="TV" class="module-tab flex-1 rounded-lg px-3 py-2 text-sm font-bold text-slate-600">Manage TV</button>
        </div>

        <label class="mt-4 block">
          <span class="text-sm font-semibold text-slate-700">Find model</span>
          <input id="modelSearchInput" type="search" list="modelOptions" placeholder="Search or type model name..." class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-brand-600 focus:ring-4 focus:ring-cyan-100">
          <datalist id="modelOptions"></datalist>
        </label>

        <div class="mt-3 flex gap-2">
          <button id="loadModelBtn" type="button" class="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-50">Load</button>
          <button id="newModelBtn" type="button" class="flex-1 rounded-xl bg-brand-700 px-3 py-2 text-sm font-semibold text-white hover:bg-brand-600">Add New Model</button>
        </div>

        <p id="modelCountLabel" class="mt-4 rounded-xl border border-cyan-100 bg-cyan-50 px-3 py-2 text-xs font-semibold text-brand-700">0 models loaded</p>
      </aside>

      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h2 id="editorTitle" class="text-xl font-bold text-slate-900">Add New Model</h2>
            <p class="text-sm text-slate-500">Edit specs, image URLs, and support documents, then save to the backend.</p>
          </div>
          <button id="saveModelBtn" type="button" class="rounded-xl bg-emerald-600 px-5 py-2.5 text-sm font-bold text-white shadow transition hover:bg-emerald-500">Save Model</button>
        </div>

        <form id="modelForm" class="mt-6 space-y-7">
          <section>
            <h3 class="text-sm font-bold uppercase tracking-[0.18em] text-slate-500">Core Specs</h3>
            <div class="mt-3 grid gap-4 md:grid-cols-2 xl:grid-cols-3">
              <label class="block"><span class="text-sm font-semibold text-slate-700">Model Name</span><input id="modelNameInput" type="text" placeholder="27P2Q" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Brand</span><input id="brandInput" type="text" placeholder="Philips / AOC" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Year</span><input id="yearInput" type="number" min="2000" max="2100" placeholder="2026" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Refresh Rate</span><input id="refreshRateInput" type="text" placeholder="144Hz" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Panel Type</span><input id="panelTypeInput" type="text" placeholder="IPS / OLED / MiniLED" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Resolution</span><input id="resolutionInput" type="text" placeholder="2560x1440" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Warranty</span><input id="warrantyInput" type="text" placeholder="5 Years" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Platform</span><input id="platformInput" type="text" placeholder="TV platform / monitor family" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Chassis</span><input id="chassisInput" type="text" placeholder="TPM..." class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
            </div>
          </section>

          <section>
            <h3 class="text-sm font-bold uppercase tracking-[0.18em] text-slate-500">Media</h3>
            <div class="mt-3 grid gap-4 md:grid-cols-3">
              <label class="block"><span class="text-sm font-semibold text-slate-700">Front Image URL</span><input id="frontImageInput" type="url" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Side Image URL</span><input id="sideImageInput" type="url" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
              <label class="block"><span class="text-sm font-semibold text-slate-700">Ports Image URL</span><input id="portsImageInput" type="url" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm"></label>
            </div>
          </section>

          <section>
            <div class="flex flex-wrap items-center justify-between gap-3">
              <h3 class="text-sm font-bold uppercase tracking-[0.18em] text-slate-500">Support Links</h3>
              <button id="addSupportLinkBtn" type="button" class="rounded-xl border border-cyan-200 bg-cyan-50 px-3 py-2 text-sm font-semibold text-brand-700 hover:bg-cyan-100">Add Link</button>
            </div>
            <div id="supportLinksList" class="mt-3 space-y-3"></div>
          </section>
        </form>
      </section>
    </div>
  </main>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
