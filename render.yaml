databases:
  - name: callcenter-postgres
    databaseName: callcenter
    user: callcenter
    region: frankfurt

services:
  - type: web
    name: callcenter-directus
    runtime: image
    image:
      url: docker.io/directus/directus:latest
    region: frankfurt
    plan: starter
    healthCheckPath: /server/health
    autoDeployTrigger: commit
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: KEY
        generateValue: true
      - key: SECRET
        generateValue: true
      - key: DB_CLIENT
        value: pg
      - key: DB_HOST
        fromDatabase:
          name: callcenter-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: callcenter-postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: callcenter-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: callcenter-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: callcenter-postgres
          property: password
      - key: DB_SSL
        value: "false"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ENABLED
        value: "true"
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: callcenter-backend
    runtime: node
    rootDir: backend
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: callcenter-postgres
          property: connectionString
      - key: PGSSLMODE
        value: require
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: ADMIN_CREDENTIALS
        sync: false
      - key: ADMIN_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_TOKEN_TTL_MINUTES
        value: "525600"
