services:
  - type: web
    name: callcenter-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: ADMIN_CREDENTIALS
        sync: false
      - key: ADMIN_TOKEN_SECRET
        sync: false
      - key: ADMIN_TOKEN_TTL_MINUTES
        value: "525600"
